version: '3.8'

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Point this to your backend GCP VM IP or domain
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: fatakpay_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
