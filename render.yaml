services:
  - type: web
    name: fatakpay-tms-backend
    env: python
    plan: starter
    buildCommand: |
      cd backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend &&
      python manage.py shell -c "from django.db import connection; [connection.cursor().execute(f'CREATE SCHEMA IF NOT EXISTS {s}') for s in ['identity', 'core', 'ai', 'audit', 'system']]" &&
      python manage.py migrate --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: fatakpay-tms-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: AI_SERVICE_ENABLED
        value: True
      - key: AI_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false # You'll need to set this manually in Render dashboard
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
